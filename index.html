<html lang="en">
<head>

  <link rel="stylesheet" href="style.css">

<body>
  <!-- Noise filter for glass texture -->
  <svg style="position:absolute;width:0;height:0">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <defs id="liquid-glass-defs"></defs>
  </svg>

  <!-- Glass Controls Panel (hidden) -->
  <div id="glass-controls" style="display:none !important">
    <div class="gc-header">
      <span>Glass Controls</span>
      <button id="gc-close">&times;</button>
    </div>
    <div class="gc-section">REFRACTION</div>
    <label>Thickness <input type="range" id="gc-thickness" min="10" max="200" value="72"><span id="gc-thickness-val">72</span></label>
    <label>Bezel <input type="range" id="gc-bezel" min="2" max="40" value="10"><span id="gc-bezel-val">10</span></label>
    <label>IOR <input type="range" id="gc-ior" min="1.0" max="3.0" step="0.05" value="1.55"><span id="gc-ior-val">1.55</span></label>
    <div class="gc-section">LOOK</div>
    <label>Blur <input type="range" id="gc-blur" min="0" max="12" step="0.1" value="5.5"><span id="gc-blur-val">5.5</span></label>
    <label>Specular <input type="range" id="gc-specular" min="0" max="1" step="0.05" value="0.65"><span id="gc-specular-val">0.65</span></label>
    <label>Tint <input type="range" id="gc-tint" min="0" max="30" step="1" value="5"><span id="gc-tint-val">5%</span></label>
    <label>Shadow <input type="range" id="gc-shadow" min="0" max="1" step="0.05" value="0.30"><span id="gc-shadow-val">0.30</span></label>
    <div class="gc-section">BORDER</div>
    <label>Width <input type="range" id="gc-border-w" min="0.25" max="3" step="0.25" value="0.5"><span id="gc-border-w-val">0.5</span></label>
    <label>Shine <input type="range" id="gc-border-shine" min="0.1" max="1" step="0.05" value="0.7"><span id="gc-border-shine-val">0.70</span></label>

  <script>
    // Lenis smooth scroll
    const lenis = new Lenis({ lerp: 0.1 });
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add(function(time) { lenis.raf(time * 1000); });
    gsap.ticker.lagSmoothing(0);

    gsap.registerPlugin(ScrollTrigger);

    // Frame sequence with GSAP ScrollTrigger
    (function() {
      const TOTAL_FRAMES = 300;
      const canvas = document.getElementById('frame-canvas');
      const ctx = canvas.getContext('2d');
      const frames = [];
      let loaded = 0;
      let currentFrame = -1;

      function padNum(n) { return String(n).padStart(4, '0'); }

      function drawFrame(index) {
        if (index === currentFrame) return;
        if (!frames[index] || !frames[index].complete) return;
        currentFrame = index;

        var img = frames[index];
        var iw = img.naturalWidth, ih = img.naturalHeight;
        var cw = canvas.width, ch = canvas.height;
        var imgRatio = iw / ih;
        var canvasRatio = cw / ch;
        var sx, sy, sw, sh;

        if (canvasRatio > imgRatio) {
          sw = iw;
          sh = iw / canvasRatio;
          sx = 0;
          sy = (ih - sh) / 2;
        } else {
          sh = ih;
          sw = ih * canvasRatio;
          sx = (iw - sw) / 2;
          sy = 0;
        }

        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, cw, ch);
      }

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        currentFrame = -1;
        drawFrame(0);
      }

      var firstFrame = new Image();
      firstFrame.src = './assets/frames-webp/0001.webp';
      firstFrame.onload = function() {
        frames[0] = firstFrame;
        resizeCanvas();
      };
      frames.push(firstFrame);

      for (var i = 2; i <= TOTAL_FRAMES; i++) {
        var img = new Image();
        img.src = './assets/frames-webp/' + padNum(i) + '.webp';
        frames.push(img);
      }

      window.addEventListener('resize', resizeCanvas);

      ScrollTrigger.create({
        trigger: '.hero',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 0.5,
        onUpdate: function(self) {
          var frameIndex = Math.min(Math.floor(self.progress * TOTAL_FRAMES), TOTAL_FRAMES - 1);
          drawFrame(frameIndex);
        }
      });
    })();

    // Hero text — letter by letter reveal
    (function() {
      var sentences = document.querySelectorAll('.hero-sentence');
      var totalSentences = sentences.length;

      // Split each line into character spans
      sentences.forEach(function(sentence) {
        sentence.querySelectorAll('.hero-line').forEach(function(line) {
          var text = line.textContent;
          line.textContent = '';
          for (var c = 0; c < text.length; c++) {
            var span = document.createElement('span');
            span.textContent = text[c];
            span.className = text[c] === ' ' ? 'hero-char is-space' : 'hero-char';
            line.appendChild(span);
          }
        });
      });

      sentences.forEach(function(sentence, si) {
        var allChars = sentence.querySelectorAll('.hero-char');
        var totalChars = allChars.length;
        var segSize = 1 / totalSentences;
        var segStart = si * segSize;
        var segEnd = segStart + segSize;
        var revealEnd = segStart + segSize * 0.65;
        var holdEnd = segStart + segSize * 0.8;

        ScrollTrigger.create({
          trigger: '.hero',
          start: 'top top',
          end: 'bottom bottom',
          scrub: 0.15,
          onUpdate: function(self) {
            var p = self.progress;

            if (p < segStart || p >= segEnd) {
              allChars.forEach(function(ch) { ch.style.opacity = '0'; });
              return;
            }

            // Reveal phase — letter by letter
            if (p < revealEnd) {
              var revealProgress = (p - segStart) / (revealEnd - segStart);
              var visibleCount = Math.floor(revealProgress * totalChars);
              allChars.forEach(function(ch, i) {
                if (i < visibleCount - 1) {
                  ch.style.opacity = '1';
                  ch.style.color = '#ffffff';
                } else if (i === visibleCount - 1) {
                  ch.style.opacity = '1';
                  ch.style.color = '#F95303';
                } else {
                  ch.style.opacity = '0';
                  ch.style.color = '#ffffff';
                }
              });
              return;
            }

            // Hold phase
            if (p < holdEnd) {
              allChars.forEach(function(ch) {
                ch.style.opacity = '1';
                ch.style.color = '#ffffff';
              });
              return;
            }

            // Exit phase — letter by letter reverse (last disappears first)
            var exitProgress = (p - holdEnd) / (segEnd - holdEnd);
            var hideCount = Math.floor(exitProgress * totalChars);
            var lastVisible = totalChars - hideCount - 1;
            allChars.forEach(function(ch, i) {
              if (i < lastVisible) {
                ch.style.opacity = '1';
                ch.style.color = '#ffffff';
              } else if (i === lastVisible) {
                ch.style.opacity = '1';
                ch.style.color = '#F95303';
              } else {
                ch.style.opacity = '0';
                ch.style.color = '#ffffff';
              }
            });
          }
        });
      });
    })();

    // Mobile button shape adaptation
    function updateMobileButtons() {
      var mobile = window.innerWidth <= 768;
      var btnLeft = document.querySelector('.btn-left');
      var btnRight = document.querySelector('.btn-right');
      var svgLeft = btnLeft.querySelector('.btn-border');
      var svgRight = btnRight.querySelector('.btn-border');
      var topContact = document.querySelector('.top-contact');
      var topSvg = topContact.querySelector('.top-contact-bg');
      var topPath = topSvg.querySelector('path');

      if (mobile) {
        var lw = 149, lh = 44, rw = 160, rh = 44;

        btnLeft.style.width = lw + 'px';
        btnLeft.style.height = lh + 'px';
        var lpd = 'M0 10V3.3C0 1.48 1.48 0 3.3 0H114.4C115.4 0 116.3 0.44 116.95 1.21L146.4 37.95C148.2 40.12 146.7 43.56 144.4 43.56H28.4C27.4 43.56 26.5 43.12 25.83 42.35L0.77 12.1C0.28 11.5 0 10.76 0 10Z';
        btnLeft.style.clipPath = "path('" + lpd + "')";
        svgLeft.setAttribute('width', lw);
        svgLeft.setAttribute('height', lh);
        svgLeft.setAttribute('viewBox', '0 0 ' + lw + ' ' + lh);
        svgLeft.querySelector('path').setAttribute('d', lpd);

        var rpd = 'M138.6 43.56H3.04C0.55 43.56 -0.94 40.54 0.61 38.41L26.3 1.31C26.92 0.48 27.9 0 28.93 0H155.7C157.5 0 159 1.48 159 3.3V17.5C159 18.23 158.76 18.94 158.32 19.53L141 42.35C140.42 43.11 139.55 43.56 138.6 43.56Z';
        btnRight.style.width = rw + 'px';
        btnRight.style.height = rh + 'px';
        btnRight.style.clipPath = "path('" + rpd + "')";
        svgRight.setAttribute('width', rw);
        svgRight.setAttribute('height', rh);
        svgRight.setAttribute('viewBox', '0 0 ' + rw + ' ' + rh);
        svgRight.querySelector('path').setAttribute('d', rpd);

        // Mobile contact button — smaller with matching diagonal
        var cw = 133, ch = 41;
        var cpd = 'M132 26.2C128.2 22.2 115.5 8.5 107.4 0.8C106.8 0.28 106 0 105 0H3.6C1.62 0 0 1.62 0 3.6V37.4C0 39.4 1.62 41 3.6 41H130C131.98 41 133.6 39.4 133.6 37.4V28.5C133.6 27.6 133.3 26.7 132.7 26.2Z';
        topContact.style.width = cw + 'px';
        topContact.style.height = ch + 'px';
        topSvg.setAttribute('width', cw);
        topSvg.setAttribute('height', ch);
        topSvg.setAttribute('viewBox', '0 0 ' + cw + ' ' + ch);
        topPath.setAttribute('d', cpd);
      } else {
        btnLeft.style.width = '180px';
        btnLeft.style.height = '53px';

    updateMobileButtons();
    window.addEventListener('resize', updateMobileButtons);

    function updateFrame() {
      const frame = document.querySelector('.frame');
      const w = frame.offsetWidth;
      const h = frame.offsetHeight;
      const svg = frame.querySelector('svg');
      const path = frame.querySelector('path');

      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

      const r = 4;
      const tr = { x: 46, y: 45 };
      const br = { x: 31, y: 40 };
      const bl = { x: 35, y: 45 };

      const d = `
        M ${w - tr.x} 0.5
        H ${r + 0.5}
        C ${r / 2} 0.5, 0.5 ${r / 2}, 0.5 ${r + 0.5}
        V ${h - bl.y}
        C 0.5 ${h - bl.y + 1}, 0.83 ${h - bl.y + 2}, 1.43 ${h - bl.y + 2.6}
        L ${bl.x} ${h - 1.5}
        C ${bl.x + 0.76} ${h - 0.52}, ${bl.x + 1.88} ${h - 0.0}, ${bl.x + 3.07} ${h - 0.0}
        H ${w - br.x}
        C ${w - br.x + 1.25} ${h}, ${w - br.x + 2.42} ${h - 0.58}, ${w - br.x + 3.18} ${h - 1.57}
        L ${w - 0.82} ${h - br.y}
        C ${w - 0.29} ${h - br.y - 0.7}, ${w - 0.0} ${h - br.y - 1.55}, ${w - 0.0} ${h - br.y - 2.43}
        V ${tr.y}
        C ${w - 0.0} ${tr.y - 1.07}, ${w - 0.43} ${tr.y - 2.09}, ${w - 1.19} ${tr.y - 2.85}
        L ${w - tr.x + 2.81} 1.66
        C ${w - tr.x + 2.06} 0.92, ${w - tr.x + 1.05} 0.5, ${w - tr.x} 0.5
        Z
      `;

      path.setAttribute('d', d);
    }

    window.addEventListener('resize', updateFrame);
    updateFrame();

    // Position progress markers below/beside each nav button
    function isMobile() { return window.innerWidth <= 768; }

    function positionMarkers() {
      var bar = document.querySelector('.progress-bar');
      var barRect = bar.getBoundingClientRect();
      var markers = document.querySelectorAll('.progress-marker');
      var navBtns = document.querySelectorAll('.nav-btn');
      var fill = document.querySelector('.progress-fill');

      if (isMobile()) {
        navBtns.forEach(function(btn, i) {
          if (markers[i]) {
            var btnRect = btn.getBoundingClientRect();
            var center = btnRect.top + btnRect.height / 2 - barRect.top;
            markers[i].style.left = '';
            markers[i].style.top = center + 'px';
          }
        });
        if (markers[0]) {
          var firstTop = parseFloat(markers[0].style.top) - 2.5;
          fill.style.left = '';
          fill.style.top = firstTop + 'px';
        }
      } else {
        navBtns.forEach(function(btn, i) {
          if (markers[i]) {
            var btnRect = btn.getBoundingClientRect();
            var center = btnRect.left + btnRect.width / 2 - barRect.left;
            markers[i].style.top = '';
            markers[i].style.left = center + 'px';
          }
        });
        if (markers[0]) {
          var firstLeft = parseFloat(markers[0].style.left) - 2.5;
          fill.style.top = '';
          fill.style.left = firstLeft + 'px';
        }
      }
    }

    window.addEventListener('resize', positionMarkers);
    setTimeout(positionMarkers, 100);

    // Scroll-driven progress bar with GSAP
    ScrollTrigger.create({
      trigger: document.documentElement,
      start: 'top top',
      end: 'bottom bottom',
      scrub: 0.3,
      onUpdate: function(self) {
        var progress = self.progress;
        var markers = document.querySelectorAll('.progress-marker');
        var fill = document.querySelector('.progress-fill');

        if (markers.length < 2) return;

        if (isMobile()) {
          var firstTop = parseFloat(markers[0].style.top) - 2.5;
          var lastTop = parseFloat(markers[markers.length - 1].style.top) + 2.5;
          var totalHeight = lastTop - firstTop;

          fill.style.top = firstTop + 'px';
          fill.style.width = '';
          fill.style.height = (totalHeight * progress) + 'px';

          var fillBottom = firstTop + totalHeight * progress;
          markers.forEach(function(marker) {
            var markerTop = parseFloat(marker.style.top) - 2.5;
            if (fillBottom >= markerTop) {
              marker.classList.add('active');
            } else {
              marker.classList.remove('active');
            }
          });
        } else {
          var firstLeft = parseFloat(markers[0].style.left) - 2.5;
          var lastLeft = parseFloat(markers[markers.length - 1].style.left) + 2.5;
          var totalWidth = lastLeft - firstLeft;

          fill.style.left = firstLeft + 'px';
          fill.style.height = '';
          fill.style.width = (totalWidth * progress) + 'px';

          var fillRight = firstLeft + totalWidth * progress;
          markers.forEach(function(marker) {
            var markerLeft = parseFloat(marker.style.left) - 2.5;
            if (fillRight >= markerLeft) {
              marker.classList.add('active');
            } else {
              marker.classList.remove('active');
            }
          });
        }

        var sections = ['home', 'about', 'products', 'reach', 'contact'];
        var activeIndex = Math.min(Math.floor(progress * sections.length), sections.length - 1);
        document.querySelectorAll('.nav-btn').forEach(function(btn, i) {
          btn.classList.toggle('active', i === activeIndex);
        });
      }
    });

    // Gradient shine animation on hover
    document.querySelectorAll('.glass-btn').forEach(btn => {
      const svg = btn.querySelector('.btn-border');
      const gradient = svg.querySelector('linearGradient');
      const stops = gradient.querySelectorAll('stop');
      const w = parseFloat(svg.getAttribute('width'));
      const h = parseFloat(svg.getAttribute('height'));
      const cx = w / 2;
      const cy = h / 2;
      const len = Math.max(w, h);
      const defaultAngle = Math.PI / 4;

      let current = defaultAngle;
      let target = defaultAngle;
      let hovering = false;
      let raf = null;

      function setGradientAngle(angle) {
        gradient.setAttribute('x1', cx - Math.cos(angle) * len / 2);
        gradient.setAttribute('y1', cy - Math.sin(angle) * len / 2);
        gradient.setAttribute('x2', cx + Math.cos(angle) * len / 2);
        gradient.setAttribute('y2', cy + Math.sin(angle) * len / 2);
      }

      function lerpAngle(a, b, t) {
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return a + diff * t;
      }

      function tick() {
        current = lerpAngle(current, target, 0.08);
        setGradientAngle(current);

        const opacityBoost = hovering ? 1.5 : 1;
        const baseOpacities = [0.8, 0.7, 0.6, 0.5, 0.4, 0.3];
        for (var s = 0; s < stops.length; s++) {
          stops[s].setAttribute('stop-opacity', Math.min(1, (baseOpacities[s] || 0.03) * opacityBoost));
        }

        if (Math.abs(target - current) > 0.005 || hovering) {
          raf = requestAnimationFrame(tick);
        } else {
          raf = null;
        }
      }

      function startLoop() {
        if (!raf) { raf = requestAnimationFrame(tick); }
      }

      btn.addEventListener('mousemove', e => {
        const rect = btn.getBoundingClientRect();
        const mx = e.clientX - rect.left - cx;
        const my = e.clientY - rect.top - cy;
        target = Math.atan2(my, mx);
        hovering = true;
        startLoop();
      });

      btn.addEventListener('mouseleave', () => {
        target = defaultAngle;
        hovering = false;
        startLoop();
      });
    });

    // Liquid glass refraction engine (from archisvaze/liquid-glass)
    const SURFACE_FN = (x) => Math.pow(1 - Math.pow(1 - x, 4), 0.25);

    function calcRefractionProfile(thickness, bezel, ior, samples) {
        samples = samples || 64;
        const eta = 1 / ior;
        const profile = new Float64Array(samples);
        for (let i = 0; i < samples; i++) {
          const x = i / samples;
          const y = SURFACE_FN(x);
          const dx = x < 1 ? 0.0001 : -0.0001;
          const y2 = SURFACE_FN(x + dx);
          const deriv = (y2 - y) / dx;
          const mag = Math.sqrt(deriv * deriv + 1);
          const nx = -deriv / mag, ny = -1 / mag;
          const dot = ny;
          const k = 1 - eta * eta * (1 - dot * dot);
          if (k < 0) { profile[i] = 0; continue; }
          const sq = Math.sqrt(k);
          const refX = -(eta * dot + sq) * nx;
          const refY = eta - (eta * dot + sq) * ny;
          profile[i] = refX * ((y * bezel + thickness) / refY);
        }
        return profile;
      }

      function genDisplacementMap(w, h, radius, bezel, profile, maxDisp) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        const img = ctx.createImageData(w, h);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) { d[i] = 128; d[i+1] = 128; d[i+2] = 0; d[i+3] = 255; }
        const r = radius, rSq = r*r, r1Sq = (r+1)**2;
        const rBSq = Math.max(r - bezel, 0) ** 2;
        const wB = w - r*2, hB = h - r*2, S = profile.length;
        for (let y1 = 0; y1 < h; y1++) {
          for (let x1 = 0; x1 < w; x1++) {
            const x = x1 < r ? x1 - r : x1 >= w - r ? x1 - r - wB : 0;
            const y = y1 < r ? y1 - r : y1 >= h - r ? y1 - r - hB : 0;
            const dSq = x*x + y*y;
            if (dSq > r1Sq || dSq < rBSq) continue;
            const dist = Math.sqrt(dSq);
            const fromSide = r - dist;
            const op = dSq < rSq ? 1 : 1 - (dist - Math.sqrt(rSq)) / (Math.sqrt(r1Sq) - Math.sqrt(rSq));
            if (op <= 0 || dist === 0) continue;
            const cos = x / dist, sin = y / dist;
            const bi = Math.min(((fromSide / bezel) * S) | 0, S - 1);
            const disp = profile[bi] || 0;
            const dX = (-cos * disp) / maxDisp, dY = (-sin * disp) / maxDisp;
            const idx = (y1 * w + x1) * 4;
            d[idx] = (128 + dX * 127 * op + 0.5) | 0;
            d[idx+1] = (128 + dY * 127 * op + 0.5) | 0;
          }
        }
        ctx.putImageData(img, 0, 0);
        return c.toDataURL();
      }

      function genSpecularMap(w, h, radius, bezel, angle) {
        angle = angle != null ? angle : Math.PI / 3;
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        const img = ctx.createImageData(w, h);
        const d = img.data;
        d.fill(0);
        const r = radius, rSq = r*r, r1Sq = (r+1)**2;
        const rBSq = Math.max(r - bezel, 0) ** 2;
        const wB = w - r*2, hB = h - r*2;
        const sv = [Math.cos(angle), Math.sin(angle)];
        for (let y1 = 0; y1 < h; y1++) {
          for (let x1 = 0; x1 < w; x1++) {
            const x = x1 < r ? x1 - r : x1 >= w - r ? x1 - r - wB : 0;
            const y = y1 < r ? y1 - r : y1 >= h - r ? y1 - r - hB : 0;
            const dSq = x*x + y*y;
            if (dSq > r1Sq || dSq < rBSq) continue;
            const dist = Math.sqrt(dSq);
            const fromSide = r - dist;
            const op = dSq < rSq ? 1 : 1 - (dist - Math.sqrt(rSq)) / (Math.sqrt(r1Sq) - Math.sqrt(rSq));
            if (op <= 0 || dist === 0) continue;
            const cos = x / dist, sin = -y / dist;
            const dot = Math.abs(cos * sv[0] + sin * sv[1]);
            const edge = Math.sqrt(Math.max(0, 1 - (1 - fromSide)**2));
            const coeff = dot * edge;
            const col = (255 * coeff) | 0;
            const alpha = (col * coeff * op) | 0;
            const idx = (y1 * w + x1) * 4;
            d[idx] = col; d[idx+1] = col; d[idx+2] = col; d[idx+3] = alpha;
          }
        }
        ctx.putImageData(img, 0, 0);
        return c.toDataURL();
      }

      function initLiquidGlass() {
        const btns = document.querySelectorAll('.liquid-glass');
        if (!btns.length) return;

        const radius = 8;
        const thickness = 100;
        const ior = 1.0;
        const blur = 3.1;
        const specOpacity = 0.1;
        const specSat = 3;

        let filtersHTML = '';

        btns.forEach((btn, i) => {
          const w = btn.offsetWidth, h = btn.offsetHeight;
          if (w < 2 || h < 2) return;

          const filterId = 'liquid-glass-filter-' + i;
          const bezel = Math.min(8, Math.min(w, h) / 2 - 1);
          const btnBlur = parseFloat(getComputedStyle(btn).getPropertyValue('--glass-blur')) || blur;
          const btnTint = parseFloat(getComputedStyle(btn).getPropertyValue('--glass-tint')) || 0;
          const btnShadow = parseFloat(getComputedStyle(btn).getPropertyValue('--glass-shadow')) || 0.15;

          const profile = calcRefractionProfile(thickness, bezel, ior, 64);
          const maxDisp = Math.max(...Array.from(profile).map(Math.abs)) || 1;
          const dispUrl = genDisplacementMap(w, h, radius, bezel, profile, maxDisp);
          const specUrl = genSpecularMap(w, h, radius, bezel * 2);
          const scale = maxDisp * 0.8;

          filtersHTML += `
            <filter id="${filterId}" x="0%" y="0%" width="100%" height="100%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="${btnBlur}" result="blurred_source"/>
              <feImage href="${dispUrl}" x="0" y="0" width="${w}" height="${h}" result="disp_map"/>
              <feDisplacementMap in="blurred_source" in2="disp_map"
                scale="${scale}" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
              <feColorMatrix in="displaced" type="saturate" values="${specSat}" result="displaced_sat"/>
              <feImage href="${specUrl}" x="0" y="0" width="${w}" height="${h}" result="spec_layer"/>
              <feComposite in="displaced_sat" in2="spec_layer" operator="in" result="spec_masked"/>
              <feComponentTransfer in="spec_layer" result="spec_faded">
                <feFuncA type="linear" slope="${specOpacity}"/>
              </feComponentTransfer>
              <feBlend in="spec_masked" in2="displaced" mode="normal" result="with_sat"/>
              <feBlend in="spec_faded" in2="with_sat" mode="normal"/>
            </filter>
          `;

          btn.style.setProperty('--liquid-filter', `url(#${filterId})`);

          const specEl = btn.querySelector('.liquid-specular');
          if (specEl) specEl.style.backgroundImage = `url(${specUrl})`;

          const tintEl = btn.querySelector('.liquid-tint');
          if (tintEl) {
            tintEl.style.background = `rgba(255, 255, 255, ${btnTint})`;
            tintEl.style.boxShadow = `inset 0 0 6px -2px rgba(255, 255, 255, ${btnShadow})`;
          }
        });

        document.getElementById('liquid-glass-defs').innerHTML = filtersHTML;
      }

    setTimeout(initLiquidGlass, 200);
    window.addEventListener('resize', () => setTimeout(initLiquidGlass, 200));

    // Glass controls panel
    var gcPanel = document.getElementById('glass-controls');
    var gcToggle = document.getElementById('gc-toggle');
    var gcClose = document.getElementById('gc-close');

    gcToggle.addEventListener('click', function() { gcPanel.classList.add('open'); gcToggle.style.display = 'none'; });
    gcClose.addEventListener('click', function() { gcPanel.classList.remove('open'); gcToggle.style.display = ''; });

    ['thickness','bezel','ior','blur','specular','tint','shadow','border-w','border-shine','border-idle'].forEach(function(key) {
      var el = document.getElementById('gc-' + key);
      el.addEventListener('input', function() {
        document.getElementById('gc-' + key + '-val').textContent = key === 'tint' ? el.value + '%' : el.value;
        updateGlassFromControls();
      });
    });

    function updateGlassFromControls() {
      var thickness = +document.getElementById('gc-thickness').value;
      var bezel = +document.getElementById('gc-bezel').value;
      var ior = +document.getElementById('gc-ior').value;
      var blur = +document.getElementById('gc-blur').value;
      var specOpacity = +document.getElementById('gc-specular').value;
      var tint = +document.getElementById('gc-tint').value;
      var shadow = +document.getElementById('gc-shadow').value;
      var borderW = +document.getElementById('gc-border-w').value;
      var borderShine = +document.getElementById('gc-border-shine').value;
      var borderIdle = +document.getElementById('gc-border-idle').value;

      var btns = document.querySelectorAll('.liquid-glass');
      var filtersHTML = '';
      var radius = 8;
      var specSat = 3;

      btns.forEach(function(btn, i) {
        var w = btn.offsetWidth, h = btn.offsetHeight;
        if (w < 2 || h < 2) return;
        var filterId = 'liquid-glass-filter-' + i;
        var clampedBezel = Math.min(bezel, Math.min(w, h) / 2 - 1);
        var profile = calcRefractionProfile(thickness, clampedBezel, ior, 64);
        var maxDisp = Math.max.apply(null, Array.from(profile).map(Math.abs)) || 1;
        var dispUrl = genDisplacementMap(w, h, radius, clampedBezel, profile, maxDisp);
        var specUrl = genSpecularMap(w, h, radius, clampedBezel * 2);
        var scale = maxDisp * 0.8;

        filtersHTML += '<filter id="' + filterId + '" x="0%" y="0%" width="100%" height="100%">' +
          '<feGaussianBlur in="SourceGraphic" stdDeviation="' + blur + '" result="blurred_source"/>' +
          '<feImage href="' + dispUrl + '" x="0" y="0" width="' + w + '" height="' + h + '" result="disp_map"/>' +
          '<feDisplacementMap in="blurred_source" in2="disp_map" scale="' + scale + '" xChannelSelector="R" yChannelSelector="G" result="displaced"/>' +
          '<feColorMatrix in="displaced" type="saturate" values="' + specSat + '" result="displaced_sat"/>' +
          '<feImage href="' + specUrl + '" x="0" y="0" width="' + w + '" height="' + h + '" result="spec_layer"/>' +
          '<feComposite in="displaced_sat" in2="spec_layer" operator="in" result="spec_masked"/>' +
          '<feComponentTransfer in="spec_layer" result="spec_faded"><feFuncA type="linear" slope="' + specOpacity + '"/></feComponentTransfer>' +
          '<feBlend in="spec_masked" in2="displaced" mode="normal" result="with_sat"/>' +
          '<feBlend in="spec_faded" in2="with_sat" mode="normal"/>' +
          '</filter>';

        btn.style.setProperty('--liquid-filter', 'url(#' + filterId + ')');
        var specEl = btn.querySelector('.liquid-specular');
        if (specEl) specEl.style.backgroundImage = 'url(' + specUrl + ')';
      });

      document.getElementById('liquid-glass-defs').innerHTML = filtersHTML;

      document.querySelectorAll('.liquid-glass .liquid-tint').forEach(function(el) {
        el.style.background = 'rgba(255, 255, 255, ' + (tint / 100) + ')';
        el.style.boxShadow = 'inset 0 0 6px -2px rgba(255, 255, 255, ' + shadow + ')';
      });

      document.querySelectorAll('.glass-nav').forEach(function(btn) {
        btn.style.setProperty('--gc-border-w', borderW + 'px');
        btn.style.setProperty('--gc-shine', borderShine);
        btn.style.setProperty('--gc-idle', borderIdle);
      });
    }

    // Nav button border shine animation on hover
    document.querySelectorAll('.glass-nav').forEach(btn => {
      const defaultAngle = 135;
      let current = defaultAngle;
      let target = defaultAngle;
      let hovering = false;
      let raf = null;

      function tick() {
        let diff = target - current;
        while (diff > 180) diff -= 360;
        while (diff < -180) diff += 360;
        current += diff * 0.15;
        btn.style.setProperty('--shine-angle', current + 'deg');

        if (Math.abs(diff) > 0.5 || hovering) {
          raf = requestAnimationFrame(tick);
        } else {
          raf = null;
        }
      }

      function startLoop() {
        if (!raf) { raf = requestAnimationFrame(tick); }
      }

      btn.addEventListener('mousemove', e => {
        const rect = btn.getBoundingClientRect();
        const mx = e.clientX - rect.left - rect.width / 2;
        const my = e.clientY - rect.top - rect.height / 2;
        target = Math.atan2(my, mx) * (180 / Math.PI) + 90;
        hovering = true;
        startLoop();
      });

      btn.addEventListener('mouseleave', () => {
        target = defaultAngle;
        hovering = false;
        startLoop();
      });
    });
  </script>
